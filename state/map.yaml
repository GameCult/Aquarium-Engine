  - Follow docs/zyphos-eusocial-sync.md and E:\Projects\Eusocial Interbeing\Eusocial Interbeing\World\Zyphos Simulation Brief.md before turning Zyphos visual choices into setting claims.
  - Follow docs/tsr-inspired-taa-spec.md when changing current temporal diagnostics.
